name: gherkin
description: Gherkin parser/compiler for Dart.
version: 0.0.1
homepage: https://github.com/lamkr/cucumber-common
publish_to: none

environment:
  sdk: '^3.7.0'

dependencies:
  characters: ^1.1.0
  cucumber_messages:
    path: ../../messages/dart
  meta: ^1.16.0
  path: ^1.8.0
  uuid: ^4.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.31.0

