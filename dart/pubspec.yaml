name: cucumber_gherkin
description: >-
  Gherkin parser and compiler for Dart. Parses .feature sources into Cucumber
  Messages envelopes.
version: 41.0.0
homepage: https://github.com/cucumber/gherkin
repository: https://github.com/cucumber/gherkin
issue_tracker: https://github.com/cucumber/gherkin/issues
documentation: https://github.com/cucumber/gherkin/tree/main/dart

funding:
  - https://opencollective.com/cucumber
  - https://github.com/sponsors/cucumber

environment:
  sdk: ^3.8.0

topics:
  - cucumber
  - gherkin
  - testing
  - parser

dependencies:
  cucumber_messages: '>=34.0.2 <35.0.0'

dev_dependencies:
  lints: ^5.1.1
  test: ^1.31.0
