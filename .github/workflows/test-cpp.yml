name: test-cpp

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - cpp/**
      - Makefile
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - cpp/**
      - Makefile
      - testdata/**
      - .github/**

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm

jobs:
  test-cpp:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-22.04, cxx: g++,      version: 10 }
          - { os: ubuntu-22.04, cxx: g++,      version: 11 }
          - { os: ubuntu-22.04, cxx: g++,      version: 12 }
          - { os: ubuntu-24.04, cxx: g++,      version: 12 }
          - { os: ubuntu-24.04, cxx: g++,      version: 13 }
          - { os: ubuntu-24.04, cxx: g++,      version: 14 }
          - { os: ubuntu-26.04, cxx: g++,      version: 13 }
          - { os: ubuntu-26.04, cxx: g++,      version: 14 }
          - { os: ubuntu-26.04, cxx: g++,      version: 15 }
          - { os: ubuntu-22.04, cxx: clang++,  version: 13 }
          - { os: ubuntu-22.04, cxx: clang++,  version: 14 }
          - { os: ubuntu-22.04, cxx: clang++,  version: 15 }
          - { os: ubuntu-24.04, cxx: clang++,  version: 16 }
          - { os: ubuntu-24.04, cxx: clang++,  version: 17 }
          - { os: ubuntu-24.04, cxx: clang++,  version: 18 }
          - { os: ubuntu-26.04, cxx: clang++,  version: 20 }
          - { os: ubuntu-26.04, cxx: clang++,  version: 21 }
          - { os: ubuntu-26.04, cxx: clang++,  version: 22 }
          - { os: macos-latest, cxx: clang++,  version: 17 }
          - { os: windows-latest, cxx: cl }

    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        if: startsWith(matrix.config.os, 'windows')

      - name: Install build tools (ubuntu)
        if: startsWith(matrix.config.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Install build tools (macos)
        if: startsWith(matrix.config.os, 'macos')
        run: brew install ccache llvm@${{ matrix.config.version }}

      - name: Cache CPM packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ hashFiles('cpp/cmake/dependencies.cpm.cmake') }}
          restore-keys: cpm-

      - name: Cache ccache
        if: "!startsWith(matrix.config.os, 'windows')"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.job }}-${{ matrix.config.os }}-${{ matrix.config.cxx }}-${{ matrix.config.version }}-${{ github.ref }}
          restore-keys: ccache-${{ github.job }}-${{ matrix.config.os }}-${{ matrix.config.cxx }}-${{ matrix.config.version }}-

      - name: Set CXX (ubuntu)
        if: startsWith(matrix.config.os, 'ubuntu')
        run: echo "CXX=${{ matrix.config.cxx }}-${{ matrix.config.version }}" >> $GITHUB_ENV

      - name: Set CXX (macos)
        if: startsWith(matrix.config.os, 'macos')
        run: echo "CXX=$(brew --prefix llvm@${{ matrix.config.version }})/bin/clang++" >> $GITHUB_ENV

      - name: Build
        working-directory: cpp
        run: cmake --workflow host

      - name: Install (Unix)
        if: ${{ matrix.config.os != 'windows-latest' }}
        working-directory: cpp
        run: sudo cmake --install build/host

      - name: Install (Windows)
        if: ${{ matrix.config.os == 'windows-latest' }}
        working-directory: cpp
        run: cmake --install build/host

  test-cpp-acceptance:
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
          - os: windows-latest
            cc: cl

    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        if: startsWith(matrix.config.os, 'windows')

      - name: Install build tools (ubuntu)
        if: startsWith(matrix.config.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Install build tools (macos)
        if: startsWith(matrix.config.os, 'macos')
        run: brew install ccache

      - name: Cache CPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ hashFiles('cpp/cmake/dependencies.cpm.cmake') }}
          restore-keys: cpm-

      - name: Cache ccache
        if: "!startsWith(matrix.config.os, 'windows')"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.job }}-${{ matrix.config.os }}-${{ matrix.config.cxx }}-${{ github.ref }}
          restore-keys: ccache-${{ github.job }}-${{ matrix.config.os }}-${{ matrix.config.cxx }}-

      - name: run acceptance tests
        working-directory: cpp
        run: make acceptance
