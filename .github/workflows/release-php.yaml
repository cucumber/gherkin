name: Release PHP

permissions: {}

on:
  push:
    branches: [release/*]

jobs:
  publish-php-subrepo:
    name: Publish to cucumber/gherkin-php subrepo
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: '0'
      - uses: cucumber/action-publish-subrepo@cdb279244fef21302e07c6b371e86870fcada592 # v2.0.0
        with:
          working-directory: php
          github-token: ${{ secrets.CUKEBOT_GITHUB_TOKEN }}
