name: test-c

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - c/**
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - c/**
      - testdata/**
      - .github/**

jobs:
  test-c:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: run acceptance tests
        run: make acceptance
        working-directory: c
