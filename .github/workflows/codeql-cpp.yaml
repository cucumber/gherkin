name: codeql-cpp

permissions: { }

on:
  push:
    branches:
      - main
    paths:
      - cpp/**
      - Makefile
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - cpp/**
      - Makefile
      - testdata/**
      - .github/**
  schedule:
    - cron: '21 5 * * 0'

concurrency:
  # Cancels in-progress runs only for pull requests
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm

    name: Analyze C++
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Cache CPM packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ hashFiles('cpp/cmake/dependencies.cpm.cmake') }}
          restore-keys: cpm-

      - name: Cache ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.job }}-${{ github.ref }}
          restore-keys: ccache-${{ github.job }}-

      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: c-cpp
          build-mode: manual
          tools: linked

      - name: Configure
        working-directory: cpp
        run: cmake --workflow host

      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:cpp"
